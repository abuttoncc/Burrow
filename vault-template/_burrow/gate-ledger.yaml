# Burrow gate ledger — autonomy is earned, not configured.
# Maintained by burrow-gate. Read by burrow-ingest at step 7.
#
# Semantics:
#   streak     consecutive human approvals with zero rejections
#   threshold  approvals needed to earn auto-promotion
#   status     manual  → every item queues for human review
#              auto    → gate applies directly (reviewer: gate-auto)
#              locked  → never eligible for auto, by design
#   One rejection → streak: 0, status: manual, and log the date.

t0-merge:          { streak: 0, threshold: 20, status: manual }
t0-new:            { streak: 0, threshold: 20, status: manual }
new-node:          { streak: 0, threshold: 20, status: manual }
edge:              { streak: 0, threshold: 20, status: manual }
cross-domain-edge: { streak: 0, threshold: 20, status: manual }
retirement:        { status: locked }   # changes to recorded current state: never automatic
axiom-change:      { status: locked }   # the ontology changes only by human hand

history: []
